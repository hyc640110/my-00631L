<script>
var STORAGE_KEY='portfolio-v4';
var CONF_KEY='portfolio-sync-conf';
var addOnEnabled=true;
var addOnSource='cash';
var price631val=40.2, price50val=150.0, priceBondval=48.15;
var isCloudSyncing=false;

function fmt(v){
  var a=Math.abs(v);
  if(a>=10000000) return (v/10000000).toFixed(2)+'千萬';
  if(a>=1000000) return (v/1000000).toFixed(2)+'百萬';
  return (v/10000).toFixed(1)+'萬';
}

async function autoRefreshAllPrices() {
  g('storageMsg').textContent = '⚡ 正在自動抓取今日即時股價...';
  var oldLock = isCloudSyncing;
  isCloudSyncing = true; // 抓取期間鎖定同步
  try {
    await Promise.all([
      fetchPriceSilent('00631L.TW', 'price631', 'price631val', 'p631time', 'btn631'),
      fetchPriceSilent('0050.TW', 'price0050', 'price50val', 'p50time', 'btn50'),
      fetchPriceSilent('00865B.TW', 'priceBond', 'priceBondval', 'p865time', 'btn865')
    ]);
  } catch(e) {}
  isCloudSyncing = oldLock;
  
  // 抓取完後，一次性更新並同步到雲端
  updateAndSync();
  showMsg('storageMsg', '✅ 今日最新股價已自動更新完畢', 3000);
}

async function fetchPriceSilent(ticker, inputId, varName, timeId, btnId) {
  var btn = g(btnId); if(btn) btn.textContent = '⏳';
  try {
    var res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/' + ticker)}`);
    if (!res.ok) throw new Error();
    var wrapper = await res.json();
    var json = JSON.parse(wrapper.contents);
    var price = json.chart.result[0].meta.regularMarketPrice;
    if (price) {
      g(inputId).value = price;
      if (varName === 'price631val') price631val = price; 
      else if (varName === 'price50val') price50val = price;
      else if (varName === 'priceBondval') priceBondval = price;
      var now = new Date(); g(timeId).textContent = '● ' + now.getHours() + ':' + (now.getMinutes() < 10 ? '0' : '') + now.getMinutes() + ' 更新';
    }
  } catch (e) {
    try {
      var resAlt = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://query2.finance.yahoo.com/v8/finance/chart/' + ticker)}`);
      var wrapperAlt = await resAlt.json();
      var jsonAlt = JSON.parse(wrapperAlt.contents);
      var priceAlt = jsonAlt.chart.result[0].meta.regularMarketPrice;
      if (priceAlt) {
        g(inputId).value = priceAlt;
        if (varName === 'price631val') price631val = priceAlt;
        else if (varName === 'price50val') price50val = priceAlt;
        else if (varName === 'priceBondval') priceBondval = priceAlt;
        var now = new Date(); g(timeId).textContent = '● ' + now.getHours() + ':' + (now.getMinutes() < 10 ? '0' : '') + now.getMinutes() + ' 更新';
      }
    } catch(err) {}
  }
  if(btn) btn.textContent = '🔄';
}

function g(id){ return document.getElementById(id); }
function val(id){ return parseFloat(g(id).value)||0; }

function applyPrice(inputId, varName){
  var v=parseFloat(g(inputId).value);
  if(!isNaN(v)&&v>0){
    if(varName==='price631val') price631val=v;
    else if(varName==='price50val') price50val=v;
    else if(varName==='priceBondval') priceBondval=v;
    updateAndSync();
  } else {
    g(inputId).value = (varName==='price631val') ? price631val : ((varName==='price50val') ? price50val : priceBondval);
  }
}

function makePresets(containerId, inputId, items, unit, isSlider){
  var c=g(containerId); if(!c) return;
  c.innerHTML='';
  items.forEach(function(p){
    var b=document.createElement('button');
    b.className='preset-btn'; b.textContent=p.label;
    b.onclick=function(){
      g(inputId).value=p.val;
      if(isSlider) updateSlider(inputId); else updateAndSync();
      updatePresetActive(containerId,inputId,items,p.val);
    };
    c.appendChild(b);
  });
}
function updatePresetActive(containerId,inputId,items,curVal){
  var btns=g(containerId).querySelectorAll('.preset-btn');
  btns.forEach(function(b,i){ b.classList.toggle('active', String(items[i].val)===String(curVal)); });
}

function updateSlider(id){
  var v=val(id);
  var labelMap={
    'rate631':{el:'rate631Label',suffix:'%'}, 'rate50':{el:'rate50Label',suffix:'%'}, 'rateBond':{el:'rateBondLabel',suffix:'%'},
    'pct631':{el:'pct631Label',suffix:'%'}, 'pct50':{el:'pct50Label',suffix:'%'}, 'pctBond':{el:'pctBondLabel',suffix:'%'},
    'addOnAmt':{el:'addOnAmtLabel',suffix:'萬'}, 'addOnDrop':{el:'addOnDropLabel',suffix:'%',prefix:'-'}, 'addOnYear':{el:'addOnYearLabel',suffix:'年'}
  };
  var m=labelMap[id];
  if(m){ var el=g(m.el); if(el) el.textContent=(m.prefix||'')+v+m.suffix; }
  updateAndSync();
}

function toggleAddOn(){
  addOnEnabled=!addOnEnabled;
  var btn=g('addOnToggle'); var body=g('addOnBody');
  if(addOnEnabled){
    btn.style.background='rgba(255,152,0,0.25)'; btn.style.borderColor='#ff9800'; btn.style.color='#ff9800';
    btn.textContent='✓ 啟用'; body.style.display='';
  } else {
    btn.style.background='rgba(255,255,255,0.06)'; btn.style.borderColor='rgba(255,255,255,0.15)'; btn.style.color='#78909c';
    btn.textContent='關閉'; body.style.display='none';
  }
  updateAndSync();
}

function setSource(src){
  addOnSource=src; var cash=g('srcCash'), newBtn=g('srcNew');
  if(src==='cash'){
    cash.style.background='rgba(255,152,0,0.25)'; cash.style.borderColor='#ff9800'; cash.style.color='#ff9800';
    newBtn.style.background='rgba(255,255,255,0.05)'; newBtn.style.borderColor='rgba(255,255,255,0.1)'; newBtn.style.color='#78909c';
  } else {
    newBtn.style.background='rgba(255,152,0,0.25)'; newBtn.style.borderColor='#ff9800'; newBtn.style.color='#ff9800';
    cash.style.background='rgba(255,255,255,0.05)'; cash.style.borderColor='rgba(255,255,255,0.1)'; cash.style.color='#78909c';
  }
  updateAndSync();
}

function update(){
  var shares=val('shares'), shares0050=val('shares0050'), sharesBond=val('sharesBond');
  var cash=val('cash')*10000; var loan=val('loanAmount')*10000;
  var loanRate=parseFloat(g('loanRate').value)||3.5;
  var rate631=val('rate631'), rate50=val('rate50'), rateBond=val('rateBond');
  var pct631=val('pct631'), pct50=val('pct50'), pctBond=val('pctBond'); var pctCash=Math.max(0,100-pct631-pct50-pctBond);
  var addOnAmt=val('addOnAmt')*10000; var addOnDrop=val('addOnDrop'), addOnYear=val('addOnYear');

  var etf631Val=price631val*shares; var etf50Val=price50val*shares0050; var etfBondVal=priceBondval*sharesBond;
  var totalAssets=etf631Val+etf50Val+etfBondVal+cash; var netAssets=totalAssets-loan;

  g('val631').textContent=fmt(etf631Val); g('val0050').textContent=fmt(etf50Val); g('valBond').textContent=fmt(etfBondVal);
  g('totalAssets').textContent=fmt(totalAssets);
  g('assetBreakdown').textContent='631L '+fmt(etf631Val)+' + 0050 '+fmt(etf50Val)+' + 865B '+fmt(etfBondVal)+' + 現金 '+fmt(cash);

  var init631=totalAssets*pct631/100; var init50=totalAssets*pct50/100; var initBond=totalAssets*pctBond/100; var initCash=totalAssets*pctCash/100;
  var beta=(pct631/100*1.9 + pct50/100*1.0 + pctBond/100*0.05).toFixed(2);

  g('cashPctInfo').textContent='現金自動：'+pctCash+'%（'+fmt(initCash)+'）';
  g('betaVal').textContent=beta; g('betaVal').style.color=beta>1.2?'#ff8a65':'#a5d6a7';
  g('betaType').textContent=beta>1.4?'積極型':beta>0.8?'穩健型':'保守型'; g('betaType').style.color=beta>1.4?'#ff8a65':'#a5d6a7';

  // 修正：防禦 totalAssets 為 0 導致分母為零的 NaN 錯誤
  var r631Pct = 0, r50Pct = 0, rBondPct = 0, rCashPct = 0, realBeta = "0.00";
  if (totalAssets > 0) {
    r631Pct = (etf631Val / totalAssets * 100);
    r50Pct = (etf50Val / totalAssets * 100);
    rBondPct = (etfBondVal / totalAssets * 100);
    rCashPct = (cash / totalAssets * 100);
    realBeta = (r631Pct / 100 * 1.9 + r50Pct / 100 * 1.0 + rBondPct / 100 * 0.05).toFixed(2);
  }
  
  g('realEffectiveBeta').textContent = `真實組合Beta: ${realBeta}`;
  
  var rBar = g('realAllocBar'); rBar.innerHTML = '';
  var rawAllocArr = [[r631Pct, '#4fc3f7'], [r50Pct, '#5c6bc0'], [rBondPct, '#a5d6a7'], [rCashPct, '#ffd54f']];
  var activeAlloc = rawAllocArr.filter(function(item){ return item[0] > 0; });
  
  activeAlloc.forEach(function(item, idx){
    var d = document.createElement('div'); d.style.flex = item[0]; d.style.background = item[1];
    if(idx === 0) d.style.borderRadius = '6px 0 0 6px';
    if(idx === activeAlloc.length - 1) d.style.borderRadius = '0 6px 6px 0';
    rBar.appendChild(d);
  });
  
  g('realAllocLabels').innerHTML = 
    `<span style="color:#4fc3f7">00631L: ${r631Pct.toFixed(1)}%</span> ` +
    `<span style="color:#5c6bc0">0050: ${r50Pct.toFixed(1)}%</span> ` +
    `<span style="color:#a5d6a7">00865B: ${rBondPct.toFixed(1)}%</span> ` +
    `<span style="color:#ffd54f">現金: ${rCashPct.toFixed(1)}%</span>`;

  var triggerPrice=(price631val*(1-addOnDrop/100)).toFixed(2);
  var dl=g('dropLabel'); if(dl) dl.textContent='觸發跌幅（≈'+triggerPrice+'元）';

  var bar=g('allocBar'); bar.innerHTML='';
  var simAllocArr = [[pct631,'#4fc3f7'],[pct50,'#5c6bc0'],[pctBond,'#a5d6a7'],[pctCash,'#ffd54f']];
  var activeSim = simAllocArr.filter(function(item){ return item[0] > 0; });
  activeSim.forEach(function(item, idx){
    var d=document.createElement('div'); d.style.flex=item[0]; d.style.background=item[1];
    if(idx===0) d.style.borderRadius='6px 0 0 6px';
    if(idx===activeSim.length-1) d.style.borderRadius='0 6px 6px 0';
    bar.appendChild(d);
  });
  
  var labels=g('allocLabels'); labels.innerHTML='';
  [['00631L '+pct631+'%','#4fc3f7',init631],['0050 '+pct50+'%','#5c6bc0',init50],['00865B '+pctBond+'%','#a5d6a7',initBond],['現金 '+pctCash+'%','#ffd54f',initCash]].forEach(function(x){
    labels.innerHTML+='<span style="color:'+x[1]+'">'+x[0]+' <span style="color:#78909c">('+fmt(x[2])+')</span></span> ';
  });

  var loanInterest=loan*loanRate/100; 
  var loanToAsset= (totalAssets) > 0 ? (loan/totalAssets*100).toFixed(1) : '0.0';
  var loanToNet=netAssets>0?(loan/netAssets*100).toFixed(1):'999'; var ls=g('loanSummary');
  var ld=g('loanDetail');

  // 修正：重構並導正信貸摘要區塊的條件鏈，徹底解除邏輯死鎖
  if(!loan || loan===0){
    ls.innerHTML='<div>年利息 <b style="color:#ef9a9a">'+fmt(0)+'</b></div>'
      +'<div>借款/總資產 <b style="color:#ffb74d">0.0%</b></div>'
      +'<div>借款/淨資產 <b style="color:#ff8a65">0.0%</b></div>'
      +'<div>淨資產 <b style="color:#a5d6a7">'+fmt(netAssets)+'</b></div>';
    ld.style.display='none';
  } else {
    ld.style.display=''; var monthRate=loanRate/100/12; var totalMonths=parseInt(g('loanTotalMonths').value)||84;
    var monthlyPayment=monthRate>0 ? loan*monthRate*Math.pow(1+monthRate,totalMonths)/(Math.pow(1+monthRate,totalMonths)-1) : loan/totalMonths;
    var startStr=g('loanStart').value||'2026-06'; var parts=startStr.split('-');
    var startYear=parseInt(parts[0])||2026, startMonth=parseInt(parts[1])||6;
    var now=new Date(); var nowYear=now.getFullYear(); var nowMonth=now.getMonth()+1;
    var elapsed=(nowYear-startYear)*12+(nowMonth-startMonth);
    var remaining=Math.max(0,totalMonths-elapsed); var paidMonths=Math.min(elapsed,totalMonths);
    var remainingPrincipal=monthRate>0 ? monthlyPayment*(1-Math.pow(1+monthRate,-remaining))/monthRate : remaining*monthlyPayment;
    
    ls.innerHTML='<div>年利息 <b style="color:#ef9a9a">'+fmt(loanInterest)+'</b></div>'
      +'<div>借款/總資產 <b style="color:#ffb74d">'+loanToAsset+'%</b></div>'
      +'<div>借款/淨資產 <b style="color:#ff8a65">'+loanToNet+'%</b></div>'
      +'<div>淨資產 <b style="color:#a5d6a7">'+fmt(netAssets)+'</b></div>'
      +'<div>剩餘期數 <b style="color:#ffcc80">'+remaining+'/'+totalMonths+' 個月</b></div>'
      +'<div>已繳 <b style="color:#a5d6a7">'+paidMonths+' 個月</b></div>';
    ld.innerHTML='每月還款 <b style="color:#ffb74d">'+fmt(monthlyPayment)+'</b> 每月利息約 <b style="color:#ef9a9a">'+fmt(loanInterest/12)+'</b><br>剩餘本金 <b style="color:#ff8a65">'+fmt(remainingPrincipal)+'</b> 剩餘期數 <b style="color:#ffcc80">'+remaining+' 個月</b>';
  }

  var chartData=[];
  for(var i=0;i<=10;i++){
    var v631=init631*Math.pow(1+rate631/100,i); 
    var v50=init50*Math.pow(1+rate50/100,i); 
    var vBond=initBond*Math.pow(1+rateBond/100,i);
    
    var vCashBase=initCash;
    var totalBase=v631+v50+vBond+vCashBase;

    var cashAfter=addOnEnabled&&addOnSource=='cash'?Math.max(0,initCash-addOnAmt):initCash;
    var vCash=addOnEnabled&&addOnSource=='cash'&&i>=addOnYear?cashAfter:initCash;
    var vAdd=addOnEnabled&&i>=addOnYear?addOnAmt*Math.pow(1+rate631/100,i-addOnYear):0;
    
    chartData.push({
      year:i, 
      v631:Math.round(v631), 
      vAdd:Math.round(vAdd), 
      v50:Math.round(v50), 
      vBond:Math.round(vBond), 
      vCash:Math.round(vCash), 
      total:Math.round(v631+vAdd+v50+vBond+vCash),
      totalBase:Math.round(totalBase)
    });
  }
  drawChart(chartData, totalAssets, addOnEnabled, addOnSource, addOnAmt, addOnYear);

  var final=chartData[10], five=chartData[5];
  var totalCost=totalAssets+(addOnEnabled&&addOnSource=='new'?addOnAmt:0);
  
  var cards=[
    {label:'五年後（含加碼）',val:fmt(five.total),sub:'+'+fmt(five.total-totalAssets),color:'#81d4fa',detail:'不加碼對照 '+fmt(five.totalBase)},
    {label:'十年後（含加碼）',val:fmt(final.total),sub:'+'+fmt(final.total-totalCost),color:'#ce93d8',detail:addOnEnabled?'加碼效益 +'+fmt(final.total-final.totalBase):'00631L '+fmt(final.v631)},
    {label:'組合 Beta',val:beta,sub:beta>1.2?'積極型':'穩健型',color:'#a5d6a7',detail:'00631L×1.9＋0050×1.0＋00865B×0.05'}
  ];
  var rc=g('resultCards'); rc.innerHTML='';
  cards.forEach(function(c){
    rc.innerHTML+='<div class="stat-card" style="background:'+c.color+'11;border:1px solid '+c.color+'33"><div class="stat-label">'+c.label+'</div><div class="stat-val">'+c.val+'</div><div class="stat-sub">'+c.sub+'</div><div class="stat-detail">'+c.detail+'</div></div>';
  });

  var stockExp = 0, stockExpPct = "0.0", e631Pct = "0.0", e50Pct = "0.0", eBondPct = "0.0", eCashPct = "0.0";
  if (totalAssets > 0) {
    stockExp=etf631Val+etf50Val+etfBondVal; stockExpPct=(stockExp/totalAssets*100).toFixed(1);
    e631Pct=(etf631Val/totalAssets*100).toFixed(1); eBondPct=(etfBondVal/totalAssets*100).toFixed(1); 
    eCashPct=(cash/totalAssets*100).toFixed(1); e50Pct=(etf50Val/totalAssets*100).toFixed(1);
  }

  var eb=g('expBar'); eb.innerHTML='';
  var expActiveArr = [[parseFloat(e631Pct),'#4fc3f7'],[parseFloat(e50Pct),'#5c6bc0'],[parseFloat(eBondPct),'#a5d6a7'],[parseFloat(eCashPct),'#ffd54f']].filter(function(x){return x[0]>0;});
  expActiveArr.forEach(function(x,i){
    var d = document.createElement('div'); d.style.flex=x[0]; d.style.background=x[1];
    if(i===0) d.style.borderRadius='6px 0 0 6px';
    if(i===expActiveArr.length-1) d.style.borderRadius='0 6px 6px 0';
    eb.appendChild(d);
  });

  var ec=g('expCards'); ec.innerHTML='';
  [
    ['00631L（2x槓桿）',e631Pct,etf631Val,'#4fc3f7'],
    ['0050（大盤權值）',e50Pct,etf50Val,'#5c6bc0'],
    ['00865B（債券）',eBondPct,etfBondVal,'#a5d6a7'],
    ['現金',eCashPct,cash,'#ffd54f']
  ].forEach(function(x){
    ec.innerHTML+='<div class="stat-card" style="background:'+x[3]+'11;border:1px solid '+x[3]+'33"><div class="stat-label">'+x[0]+'</div><div style="font-size:18px;font-weight:800;color:'+x[3]+'">'+x[1]+'%</div><div style="font-size:10px;color:#546e7a">'+fmt(x[2])+'</div></div>';
  });

  var combinedDefenseVal = etfBondVal + cash;
  var combinedDefensePct = totalAssets > 0 ? (combinedDefenseVal / totalAssets * 100).toFixed(1) : '0.0';
  g('combinedDefenseCard').innerHTML = `🛡️ 寬鬆防禦資產 (00865B美債 + 現金)：<span style="color:#ffd54f; font-size:14px; font-weight:800;">${combinedDefensePct}%</span> <span style="color:#90a4ae; font-size:10px; font-weight:normal;">(${fmt(combinedDefenseVal)})</span>`;

  g('expTotal').innerHTML='總曝險 <b style="color:#ef9a9a"> '+stockExpPct+'%</b> 有效Beta <b style="color:#ffcc80">'+beta+'</b>';

  var lec=g('loanExpCards'); lec.innerHTML='';
  if(loan>0){
    lec.innerHTML='<div style="font-size:10px;color:#78909c;margin-bottom:6px">借款曝險</div><div class="grid3">';
    [[' 借款/總資產',loanToAsset+'%','#ffb74d'],['借款/淨資產',loanToNet+'%','#ff8a65'],['年利息成本',fmt(loanInterest),'#ef9a9a']].forEach(function(x){
      lec.innerHTML+='<div class="stat-card" style="background:rgba(255,183,77,0.08);border:1px solid rgba(255,183,77,0.2);"><div class="stat-label">'+x[0]+'</div><div style="font-size:16px;font-weight:800;color:'+x[2]+'">'+x[1]+'</div></div>';
    });
    lec.innerHTML+='</div>';
  }

  var lc=g('lossCards'); lc.innerHTML='';
  [{label:'市場跌 -20%',drop:0.20},{label:'市場跌 -30%',drop:0.30},{label:'市場跌 -50%',drop:0.50}].forEach(function(s){
    var loss631=etf631Val*s.drop*1.9, loss50=etf50Val*s.drop*1.0, lossBond=etfBondVal*s.drop*0.05; var total=loss631+loss50+lossBond; var pct = totalAssets > 0 ? (total/totalAssets*100).toFixed(1) : "0.0";
    lc.innerHTML+='<div class="stat-card" style="background:rgba(239,83,80,0.08);border:1px solid rgba(239,83,80,0.2)"><div style="font-size:10px;color:#ef9a9a;font-weight:700;margin-bottom:4px">'+s.label+'</div><div style="font-size:16px;font-weight:800;color:#fff">-'+fmt(total)+'</div><div style="font-size:10px;color:#ef5350;margin:2px 0">-'+pct+'%</div></div>';
  });
}

function drawChart(data, totalAssets, addOnEnabled, addOnSource, addOnAmt, addOnYear){
  var canvas=g('chart'); if(!canvas) return;
  var W=canvas.offsetWidth||canvas.parentElement.offsetWidth||320;
  canvas.width=W*2; canvas.height=520; canvas.style.width=W+'px'; canvas.style.height='260px';
  var ctx=canvas.getContext('2d'); 
  
  var pad={top:25,right:20,bottom:30,left:110};
  var cw=canvas.width-pad.left-pad.right; var ch=canvas.height-pad.top-pad.bottom;
  
  var rawMax=0; data.forEach(function(d){ if(d.total>rawMax) rawMax=d.total; });
  
  var rawStep = rawMax / 4;
  var step = 100000;
  if (rawStep > 10000000) step = 10000000;
  else if (rawStep > 5000000) step = 5000000;
  else if (rawStep > 2000000) step = 2000000;
  else if (rawStep > 1000000) step = 1000000;
  else if (rawStep > 500000) step = 500000;
  else if (rawStep > 200000) step = 200000;

  var maxVal = Math.ceil(rawMax / step) * step;
  if (maxVal === 0) maxVal = step * 4;

  function xPos(i){ return pad.left+i*(cw/10); } function yPos(v){ return pad.top+ch*(1-v/maxVal); }
  
  ctx.clearRect(0,0,canvas.width,canvas.height);
  
  ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=1;
  for(var i=0; i<=4; i++){
    var curTickVal = (maxVal / 4) * (4 - i);
    var y = pad.top + i * (ch / 4);
    ctx.beginPath(); ctx.moveTo(pad.left,y); ctx.lineTo(pad.left+cw,y); ctx.stroke();
    ctx.fillStyle='#90a4ae'; ctx.font='20px -apple-system,sans-serif'; ctx.textAlign='right'; 
    ctx.fillText(fmt(curTickVal),pad.left-10,y+6);
  }

  ctx.fillStyle='#546e7a';
  ctx.font='18px -apple-system,sans-serif';
  ctx.textAlign='center';
  for(var i=0; i<=10; i+=2){
    ctx.fillText('第'+i+'年', xPos(i), canvas.height - 6);
  }
  
  var layers=[{key:'v631',color:'#4fc3f7'},{key:'vAdd',color:'#ff9800'},{key:'v50',color:'#5c6bc0'},{key:'vBond',color:'#a5d6a7'},{key:'vCash',color:'#ffd54f'}];
  layers.forEach(function(layer){
    ctx.beginPath();
    data.forEach(function(d,i){
      var bottom=0; var idx=layers.indexOf(layer); for(var j=idx+1;j<layers.length;j++) bottom+=d[layers[j].key];
      var top=bottom+d[layer.key]; if(i===0) ctx.moveTo(xPos(0),yPos(top)); else ctx.lineTo(xPos(i),yPos(top));
    });
    for(var i=10;i>=0;i--){
      var bottom=0; var idx=layers.indexOf(layer); for(var j=idx+1;j<layers.length;j++) bottom+=data[i][layers[j].key];
      ctx.lineTo(xPos(i),yPos(bottom));
    }
    ctx.closePath(); ctx.fillStyle=layer.color+'44'; ctx.fill();
  });

  var costBase = totalAssets; 
  var yLineInitial = yPos(costBase);
  
  ctx.save();
  ctx.lineWidth = 2.5;
  ctx.strokeStyle = '#ef9a9a';
  ctx.setLineDash([8, 6]); 
  
  if (addOnEnabled && addOnSource === 'new') {
    var xTrigger = xPos(addOnYear);
    var yLineAfter = yPos(costBase + addOnAmt);
    
    ctx.beginPath();
    ctx.moveTo(xPos(0), yLineInitial);
    ctx.lineTo(xTrigger, yLineInitial);
    ctx.lineTo(xTrigger, yLineAfter);
    ctx.lineTo(xPos(10), yLineAfter);
    ctx.stroke();
    
    ctx.setLineDash([]); 
    ctx.fillStyle = '#ef9a9a';
    ctx.font = 'bold 18px -apple-system,sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('原始成本: ' + fmt(costBase), xPos(0) + 10, yLineInitial - 8);
    ctx.fillText('加碼後總成本: ' + fmt(costBase + addOnAmt), xTrigger + 10, yLineAfter - 8);
  } else {
    ctx.beginPath();
    ctx.moveTo(xPos(0), yLineInitial);
    ctx.lineTo(xPos(10), yLineInitial);
    ctx.stroke();
    
    ctx.setLineDash([]); 
    ctx.fillStyle = '#ef9a9a';
    ctx.font = 'bold 18px -apple-system,sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('原始成本: ' + fmt(costBase), xPos(0) + 10, yLineInitial - 8);
  }
  ctx.restore();
}

function showMsg(id, text, ms){ var el=g(id); el.textContent=text; setTimeout(function(){ el.textContent=''; }, ms||3000); }

function saveSyncConfig() {
  var conf = { url: g('fbUrl').value.trim(), key: g('fbKey').value.trim() };
  localStorage.setItem(CONF_KEY, JSON.stringify(conf));
}

function updateAndSync() {
  update();
  var confStr = localStorage.getItem(CONF_KEY);
  if (!confStr || isCloudSyncing) return;
  var conf = JSON.parse(confStr);
  if (!conf.url || !conf.key) return;

  clearTimeout(window.syncTimer);
  window.syncTimer = setTimeout(async function() {
    if (isCloudSyncing) return; // 雙重防禦檢查
    g('cloudStatus').textContent = '⚡ 同步中...';
    try {
      var data = getSettings();
      var res = await fetch(conf.url + conf.key + '.json', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      if(res.ok) g('cloudStatus').textContent = '✅ 雲端已同步';
      else g('cloudStatus').textContent = '❌ 同步失敗';
    } catch(e) { g('cloudStatus').textContent = '❌ 網路錯誤'; }
  }, 1000);
}

async function loadFromCloud() {
  var url = g('fbUrl').value.trim();
  var key = g('fbKey').value.trim();
  if(!url || !key) { alert('請先輸入雲端網址與個人密鑰！'); return; }
  saveSyncConfig();
  g('cloudStatus').textContent = '⚡ 下載中...';
  try {
    isCloudSyncing = true; // 鎖定同步機制
    var res = await fetch(url + key + '.json');
    if(res.ok) {
      var cloudData = await res.json();
      if(cloudData) {
        applySettings(cloudData);
        g('cloudStatus').textContent = '✅ 雲端連線成功';
        // 優化：下載後才非同步抓即時價，避免時序衝突引起的連續閃爍
        autoRefreshAllPrices();
      } else {
        g('cloudStatus').textContent = '💡 雲端無資料 (已初始化)';
        isCloudSyncing = false;
        autoRefreshAllPrices();
      }
    } else { throw new Error(); }
  } catch(e) { g('cloudStatus').textContent = '❌ 連線失敗'; isCloudSyncing = false; }
}

function getSettings(){
  return {
    shares:val('shares'), price631:price631val, shares0050:val('shares0050'), price0050:price50val, sharesBond:val('sharesBond'), priceBond:priceBondval,
    cash:val('cash'), rate631:val('rate631'), rate50:val('rate50'), rateBond:val('rateBond'), pct631:val('pct631'), pct50:val('pct50'), pctBond:val('pctBond'),
    addOnEnabled:addOnEnabled, addOnSource:addOnSource, addOnAmt:val('addOnAmt'), addOnDrop:val('addOnDrop'), addOnYear:val('addOnYear'),
    loanAmount:val('loanAmount'), loanRate:parseFloat(g('loanRate').value)||3.5, loanStart:g('loanStart').value, loanTotalMonths:val('loanTotalMonths')||84,
  };
}

function applySettings(s){
  if(!s) return;
  isCloudSyncing = true; // 修正：解析寫入期間嚴格鎖死 updateAndSync 上傳機制
  
  if(s.shares!=null) g('shares').value=s.shares;
  if(s.price631!=null){ price631val=s.price631; g('price631').value=s.price631; }
  if(s.shares0050!=null) g('shares0050').value=s.shares0050;
  if(s.price0050!=null){ price50val=s.price0050; g('price0050').value=s.price0050; }
  if(s.sharesBond!=null) g('sharesBond').value=s.sharesBond;
  if(s.priceBond!=null){ priceBondval=s.priceBond; g('priceBond').value=s.priceBond; }
  if(s.cash!=null) g('cash').value=s.cash;
  if(s.rate631!=null){ g('rate631').value=s.rate631; g('rate631Label').textContent=s.rate631+'%'; }
  if(s.rate50!=null){ g('rate50').value=s.rate50; g('rate50Label').textContent=s.rate50+'%'; }
  if(s.rateBond!=null){ g('rateBond').value=s.rateBond; g('rateBondLabel').textContent=s.rateBond+'%'; }
  if(s.pct631!=null){ g('pct631').value=s.pct631; g('pct631Label').textContent=s.pct631+'%'; }
  if(s.pct50!=null){ g('pct50').value=s.pct50; g('pct50Label').textContent=s.pct50+'%'; }
  if(s.pctBond!=null){ g('pctBond').value=s.pctBond; g('pctBondLabel').textContent=s.pctBond+'%'; }
  if(s.addOnEnabled!=null && s.addOnEnabled!==addOnEnabled) toggleAddOn();
  if(s.addOnSource!=null) setSource(s.addOnSource);
  if(s.addOnAmt!=null){ g('addOnAmt').value=s.addOnAmt; g('addOnAmtLabel').textContent=s.addOnAmt+'萬'; }
  if(s.addOnDrop!=null){ g('addOnDrop').value=s.addOnDrop; g('addOnDropLabel').textContent='-'+s.addOnDrop+'%'; }
  if(s.addOnYear!=null){ g('addOnYear').value=s.addOnYear; g('addOnYearLabel').textContent=s.addOnYear+'年'; }
  if(s.loanAmount!=null) g('loanAmount').value=s.loanAmount;
  if(s.loanRate!=null) g('loanRate').value=s.loanRate;
  if(s.loanStart!=null) g('loanStart').value=s.loanStart;
  if(s.loanTotalMonths!=null) g('loanTotalMonths').value=s.loanTotalMonths;
  
  update();
  isCloudSyncing = false; // 解析完成，釋放同步鎖
}
